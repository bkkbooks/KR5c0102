body:
  text: 道德真經藏室纂微開題欲一老子姓李名耳字聃或字伯陽按道家經籍所說則挺生空洞之先變化自然之妙而常居天上代為帝師此則六合之外事故略而不論也非其徑庭之語者舉其大槩云老子母感大流星而有娠應見于李氏降生于商室於商十八王陽甲之十七年歲在庚申寄胎託娠經八十一年極太陽九九之數其母常逍遙李樹之下而生老子老子生而皓首故能言因指李曰此吾姓也又云父姓李名無果母尹氏名益壽當商二十二王武丁之九年歲在庚辰二月十五日卯時生也或云老子身長八尺八寸黃色美眉廣顙聃耳大目疏齒方口厚唇額有三五達理日角月淵鼻有雙骨耳有三漏足蹈二午手握十文蓋禀氣至清而受形特異生於楚國苦縣瀨鄉曲仁里渦水之陰至紂二十一年丁卯歲居岐山之陽西伯聞之詔為守藏史武王克商轉為柱下史歷成康之世潜默卑秩居周久之見周衰而退官至昭王二十五年癸丑歲五月二十九日壬午乃乘青牛薄軬車徐甲為御遂去周關令尹喜周大夫也姓尹名喜字陽公著書九篇說道德之事或今西升經是又莊列所引之句或言善內學星宿服精華隱德行仁時人莫知也喜姿形長美雅好典墳善天文祕緯仰觀俯察莫不洞徹雖鬼神之變無以匿其情大度恢傑不修俗禮慈儉博愛損身濟物入為東宫賔友出補函谷關令每望霄漢有升虛之思老子未至關時喜登樓四望見東方有紫雲西邁知有真人當過京邑乃戒嚴門吏掃路焚香以俟應兆至七月十二日甲子老子到關喜擎跽曲拳邀迎就舍巾櫛盥漱齊戒問道至于十二月二十五日退官託疾二十八日授道德二篇喜叩頭請隨老子西徂流沙老子曰汝未得道惡能隨吾遠適夫流沙異域獷俗難化而何術可禦邪唯生道入腹神明皆存而能除垢止念靜心守一千日清齊鍊形入妙而後可尋吾於蜀郡青羊之肆其若之何喜唯唯而謝老子忽然騰空冉冉升乎太微喜候光景斯散影響蕭寂樓居清齊屏絶童隸誦經三年精思千日心凝形釋骨肉都融已而窮數達變之微因形移易之妙無不盡之矣於是去家超然高蹈既往青羊之肆乃會老子老子命喜為文始先生俱遊乎流沙之域或曰昭王時出關化導西胡至幽王時却還中夏故孔子適周嚴事老子而問禮焉老子曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則蓬纍而行吾聞之良賈深藏若虛君子盛德容貌若愚去子之驕氣與多欲態色與淫志是皆無益於子之身吾所以告子若是而已孔子去謂弟子曰鳥吾知其能飛魚吾知其能游獸吾知其能走走者可以為罔游者可以為綸飛者可以為矰至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍邪是時天下暗王道衰故再出關或言二百餘歲以其修道而養壽也老子受學於容成問道於常摐皆古之隱君子也老子之子名宗宗仕魏為將軍封於段干宗之子注注之子宫宫之遠孫假假仕於漢孝文帝假之子解解為膠西王卬太傅因家于齊夫有天地則有道術道術之士何時暫乏自伏義以來至于三代顯名道士世世有之論之老子本亦人靈蓋得道之尤精者也時俗見其久壽又生而皓首故曰老子老者尊稱也子者通號也人受命自有通神達見者稟氣與常人不同應為道主故能為天神所濟衆仙所從是以所出度世之法若九丹八石玉醴全液存真守元思神歷藏行氣鍊形消灾辟惡治鬼養性絶穀變化猒固教戒役使鬼魅皆老子常所經歷救世之術非至極者也已而治家治世皆大道之土苴聖人之餘事也老子恬淡無為專以長生為務故在周雖久而名位不遷者蓋和光同塵內實自然所貴道虛無因應變化無為故著書稱微妙難識道成乃去是所謂博大真人也且老子之子孫祭祀不輟而升于玉京莊子之鼓盆送妻而入侍帝宸皆為道之宗師者使後世之人信長生之可學非神異而學不能及也是曰方外之教有淳古之風焉歷代尊崇廟貌不絶至唐乾封元年高宗詔贈老子為玄元皇帝光宅元年太后詔贈尹氏為先天太后故為有唐聖祖焉昔老子著書曰道德二篇今曰老子道德經者當是關尹受書之後標題云耳夫道者杳然難言有物混成强名曰道以其通生萬物故訓曰通又道蹈也況道路之道使人佩服其言而履行之也道者德之欽有道則必有德德得也內得於心外得於物得而不喪也故物得以生謂之德有德則必全道道德相須而不相離故曰道德也經者常也法也言其理有常可法如九經可法之義又經者書之尊稱也今言道經上德經下者上篇之首取其道可道非常道下篇之首取其上德不德是以有德而題之也後之說者故隨文生義言道非德無以顯德非道無以明道無為無形故居化物之先德有用有為故在生化之後道衰而有德德衰而有五常是明道德為衆行之先五常之本故道經居先德經次之上下二卷法兩儀之生育八十一章象太陽之極數是以上經明道以法天下經明德以法地天數奇故上經三十有七章地數偶故下經四十有四章此皆起自先賢且仍舊貫此經以重淵為宗自然為體道德為用其要在乎治身治國治國則我無為而民自化我無欲而民自朴治身則塞其兊閉其門谷神不死少私寡欲此其要㫖可得而言也若夫視之不見聽之不聞淵之又淵衆妙之門殆不可得而言傳也故遊其廊廡者皆自以謂升堂睹奧及其研精覃思然後於道知其秋毫之端萬分未得處一焉輒依師授之㫖略纂昔賢之微其如恍惚杳冥在達者之自悟耳老子論天下無二道聖人無兩心其著書所以傳道其垂教所以救時救時之弊不同故迹之出亦異其迹既異故立言有不同使後世之士於此異觀而以孔老為殊訓也苟通其道而不窒以時會其心而不拘以迹得其意而不泥以言則諸聖之書相為終始固未嘗少戾也自三代之季聖王不作天下溺於文勝之弊無以反其情性而復其初道降德衰未有甚於此時者也老聃氏生於周以濡弱謙下為表以虛空不毁萬物為實故其去藏室而隱也關令尹喜請著書遂作八十一章以暢道德之㫖其辭簡其理遠以深為根以約為紀以本為精以末為粗必欲使斯民復結繩之朴而後己其所以扶教救時可謂切至矣不幸後世不見天地之全功聖人之大體儒者若馬遷氏至謂學儒者黜老學老者黜儒道不同不相為謀也楊雄氏曰絶滅禮樂吾無取焉韓愈氏曰坐井觀天其見者小也三君子者一何不知聖人之甚歟蓋道猶歲也聖人時也夏以生出為功秋以收斂為德一則使之榮華而蕃鮮一則使之凋悴而反本相因而歲功成焉且自伏羲始造法迄于堯舜三代禮樂制作炳然大備則夏之時也當老子之時禮文過度若不斂浮華而歸道德聖功何由而成哉其言失道而後德至失義而後禮禮者忠信之薄而亂之首者謂天下莫尊於道德而莫卑於禮茍自禮反之於仁義仁義復歸於道德其於治天下有不足為矣所以黜仁義禮智而皆以道德著書詔天下後世其言有物混成先天地生夫太易之初渾淪而已無形體之可見無氣質之可名逮乎易變而為一始有數矣一變而為七七變而為九九者究也乃復歸而為一即其所生而歸之也如此變化往復何有窮盡故老氏著書九九篇以明陰陽消息禍福倚伏天道往來人事終始無不備焉孔子與老氏同時皆著書以垂不朽孔子曰我學不厭老氏則絶學孔子曰必也聖乎老氏則絶聖孔子貴仁義老氏棄仁義孔子舉賢才老氏不尚賢孔子曰智者不惑老氏曰以智治國國之賊其立言大率相反是豈故相乖背耶蓋孔子立道之常以經世變老子明道之本以救時弊其勢不得不然也絶學則使已任其性命之情而造坐忘日損之妙絶聖則使人安其性命之清而無驚愚明污之志棄仁義則無蹩躠踶跂之私使天下不獨親其親子其子而同歸於孝慈不尚賢則無儒墨畢起之爭使天下無夸跂相軋之心以智治國國之賊言澆僞多而智愈困孰若政悶悶而民淳淳哉其所以立言不同者以此及莊周之書寓言十九發明玄㫖多假孔老相為問答而傳亦載其問禮之事使其道異耶何為有竊比老彭及猶龍之語是必有名異而實同者後世束教之士以迹觀聖人相去益遠矣老子曰吾言甚易知甚易行天下莫能知莫能行萬世之後一遇聖賢既以其所知行之而成清靜之治又以其所言發之而為博大之書使四海還淳道德不廢仰何幸歟抑何幸歟文康公葛邲次仲述碧虛子陳君景元師事天合山鴻濛子張無夢得老氏心印有道德經藏室纂微篇蓋托諸家注疏之精華而參以師傳之祕文義該贍道物兼明發揮清靜之宗丕贊聖神之化熙寧中召對便殿因進所著睿眷殊渥宣附道藏鎮諸名山四海學徒典刑是賴仲庚西蜀末楬訪道東南課習是經垂髫逮白義海重玄望洋竊歎幸窺纂微之要若披雲霧而覩日月也第以世無善本流行未博敬就藏帙詳加校正募化善士命工刊梓以傳不朽上答玄元道祖立言開教之恩次酬父師生成訓迪之賜普祈同志潛心玩繹因言會道俱證無為益衍真風保安國祚庶表林下野人報本之萬一云皇宋寶祐戊午上元日瞻山靈應觀開山管轄住持觀事臣楊仲庚拜手謹書
